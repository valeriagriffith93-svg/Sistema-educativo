<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles.css">
    <script defer src="../static/app.js"></script>
</head>
<body>
    <div class="login-container">
        <form class="login-form" action="/registro" method="POST">
            <h2>Registro de Usuario</h2>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error-message">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            {% endwith %}

            <!-- Nombre -->
            <div class="form-group">
                <i class="fas fa-user icon"></i>
                <input type="text" name="usuario" placeholder="Nombre de Usuario" required>
            </div>

            <!-- Correo — era "icono", debe ser "icon" -->
            <div class="form-group">
                <i class="fas fa-envelope icon"></i>
                <input type="text" name="email" placeholder="Correo Electrónico" required>
            </div>

            <!-- Contraseña — "fa-look" no existe, se cambia a "fa-lock" -->
            <div class="form-group password-group">
                <i class="fas fa-lock icon"></i>
                <input type="password" name="contrasena" id="password" placeholder="Contraseña" required>
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>

            <!-- Dirección — "fa-look" no existe, se cambia a "fa-map-marker-alt" -->
            <div class="form-group">
                <i class="fas fa-map-marker-alt icon"></i>
                <input type="text" name="direccion" id="address" placeholder="Dirección" required>
            </div>

            <!-- Grupo (oculto por defecto) -->
            <div class="form-group" id="grupoDiv">
                <i class="fas fa-users icon"></i>
                <select name="grupo">
                    <option value="">Selecciona tu grupo</option>
                    <option value="1001">1001</option>
                    <option value="1002">1002</option>
                    <option value="1003">1003</option>
                    <option value="1004">1104</option>
                    <option value="1101">1101</option>
                    <option value="1102">1102</option>
                    <option value="1103">1103</option>
                    <option value="1104">1104</option>
                </select>
            </div>

            <!-- Rol — faltaba clase "icon" -->
            <div class="form-group">
                <i class="fas fa-user-graduate icon"></i>
                <select name="rol" id="rol" required>
                    <option value="">Selecciona tu rol</option>
                    <option value="estudiante">🎓 Estudiante</option>
                    <option value="profesor">👨‍🏫 Profesor</option>
                </select>
            </div>

            <button type="submit" class="btn">Registrarse</button>

            <div class="login-link">
                <p>¿Ya tienes cuenta? <a href="login" class="login-text">¡Inicia sesión aquí!</a></p>
            </div>
        </form>
    </div>

    <script>
        const rol = document.getElementById("rol");
        const grupoDiv = document.getElementById("grupoDiv");

        grupoDiv.style.display = "none";

        rol.addEventListener("change", function() {
            if (this.value === "estudiante") {
                grupoDiv.style.display = "flex";
            } else {
                grupoDiv.style.display = "none";
            }
        });

        // Ojo para mostrar/ocultar contraseña
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");

        togglePassword.addEventListener("click", () => {
            const tipo = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", tipo);
            togglePassword.classList.toggle("fa-eye");
            togglePassword.classList.toggle("fa-eye-slash");
        });
    </script>
</body>
</html>
